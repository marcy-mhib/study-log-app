<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>編集</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
#subjectButtons button{
    margin:5px;
    padding:8px 14px;
    border:none;
    border-radius:20px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

#subjectButtons button:hover{
    background:#45a049;
}
</style>

</head>

<body>

<div class="container">

<h2 class="mt-4">学習記録を編集</h2>

<form action="/update/{{ log[0] }}" method="post">

<p>科目：</p>

<div id="subjectButtons">
{% for s in subjects %}
<button type="button" onclick="selectSubject('{{ s }}')">
    {{ s }}
</button>
{% endfor %}
</div>

<input
type="text"
name="subject"
id="subjectInput"
class="form-control"
value="{{ log[1] }}"
placeholder="科目を選択 or 入力"
required
>

<script>
function selectSubject(subject){
    document.getElementById("subjectInput").value = subject;
}
</script>


<label class="mt-3">時間</label>

<div class="row">

<div class="col">

<select class="form-control" name="hour">

{% for i in range(0,13) %}
<option value="{{ i }}"
{% if log_hour == i %}selected{% endif %}
>
{{ i }}
</option>
{% endfor %}

</select>

</div>

<div class="col">時間</div>

<div class="col">

<select class="form-control" name="minute">

{% for i in range(0,60,5) %}
<option value="{{ i }}"
{% if log_minute == i %}selected{% endif %}
>
{{ i }}
</option>
{% endfor %}

</select>

</div>

<div class="col">分</div>

</div>


<div class="col-md-4 mt-3">
<input
class="form-control"
name="memo"
value="{{ log[3] }}"
placeholder="メモ">
</div>

<div class="col-md-2 mt-3">
<button class="btn btn-primary w-100">更新</button>
</div>

<br>

<a href="/" class="btn btn-secondary mt-3">戻る</a>

</form>

</div>

</body>
</html>
